# Configuração Alembic — DSN é injetado em runtime por alembic/env.py via app.config.Settings.
# Não escrever DATABASE_URL aqui (segredo, depende de ENVIRONMENT).

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os
output_encoding = utf-8

[post_write_hooks]
# Sprint 0: nenhum hook. Avaliar `ruff format` em sprints futuras.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
