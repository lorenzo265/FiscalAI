services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fiscal_postgres
    environment:
      POSTGRES_USER: fiscal
      POSTGRES_PASSWORD: fiscal
      POSTGRES_DB: fiscal
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiscal -d fiscal"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: fiscal_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Ollama agora roda no HOST (GPU) — o backend o acessa via host.docker.internal.
  # Para voltar ao Ollama containerizado (CPU, self-contained), restaure este
  # serviço + o volume `ollama_data` e aponte OLLAMA_URL para http://ollama:11434.
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: fiscal_ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   healthcheck:
  #     test: ["CMD", "ollama", "list"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
      target: dev
    container_name: fiscal_api
    environment:
      ENVIRONMENT: local
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://fiscal:fiscal@postgres:5432/fiscal
      REDIS_URL: redis://redis:6379/0
      # Ollama no host (GPU). gemma3:4b (3.3GB) cabe inteiro na VRAM → rápido.
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: gemma3:4b
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app:ro
      - ./alembic:/app/alembic:ro
      - ./tests:/app/tests:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  postgres_data:
