# Gate de commit (git-level). Ativar uma vez na raiz do repo: `pre-commit install`.
# Roda rápido a cada commit. O gate pesado (pytest + mypy) fica no CI e no /validar-fiscal.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^analista-fiscal-api/
      - id: ruff-format
        files: ^analista-fiscal-api/
